<h1>Interpolación Lineal</h1>

<p>

La interpolación lineal permite estimar valores
intermedios o futuros utilizando dos puntos conocidos.

</p>

<h2>Fórmula</h2>

<p>

y = y1 + ((x-x1)(y2-y1))/(x2-x1)

</p>
